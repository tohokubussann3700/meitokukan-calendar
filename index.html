<!DOCTYPE html>
<html lang="ja">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>秋田明徳館高校 統合カレンダー R8</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Hiragino Kaku Gothic Pro','Yu Gothic',Meiryo,sans-serif;background:#f0f4f8;color:#1a2a3a;min-height:100vh}
.app{display:flex;flex-direction:column;min-height:100vh}
.topbar{background:#1a3a5c;color:#fff;padding:12px 20px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.topbar-left h1{font-size:15px;font-weight:700;letter-spacing:.05em}
.topbar-left p{font-size:11px;opacity:.65;margin-top:2px}
.sync-status{font-size:10px;padding:4px 10px;border-radius:12px;background:rgba(255,255,255,.15);display:flex;align-items:center;gap:5px;white-space:nowrap}
.sync-dot{width:7px;height:7px;border-radius:50%;background:#1d9e75;flex-shrink:0}
.sync-dot.loading{background:#ef9f27;animation:blink .8s infinite}
.sync-dot.error{background:#e24b4a}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.legend{display:flex;gap:8px;flex-wrap:wrap;padding:6px 14px;background:#fff;border-bottom:1px solid #dde5ee}
.leg{display:flex;align-items:center;gap:4px;font-size:10px;color:#556}
.leg-dot{width:10px;height:10px;border-radius:2px;flex-shrink:0}
.filter-pills{display:flex;gap:6px;flex-wrap:wrap;padding:8px 14px;background:#fff;border-bottom:1px solid #dde5ee}
.pill{padding:4px 12px;border-radius:14px;font-size:11px;cursor:pointer;border:1px solid #c0cad6;background:#fff;color:#4a5a6a;transition:all .12s;user-select:none}
.pill.on{background:#1a3a5c;color:#fff;border-color:#1a3a5c}
.jump-nav{display:flex;flex-wrap:wrap;gap:5px;padding:6px 14px;background:#f8f9fb;border-bottom:1px solid #dde5ee}
.jump-btn{padding:3px 10px;background:#fff;border:1px solid #c8d8ea;border-radius:5px;font-size:11px;cursor:pointer;color:#1a3a5c;font-family:inherit}
.jump-btn:hover{background:#1a3a5c;color:#fff}
.main-area{display:flex;flex:1}
.cal-panel{flex:1;overflow-y:auto;padding:12px;min-width:0}
.park-panel{width:340px;min-width:340px;border-left:1px solid #dde5ee;background:#fff;overflow-y:auto;display:none}
.park-panel.open{display:block}
@media(max-width:760px){.main-area{flex-direction:column}.park-panel{width:100%;min-width:0;border-left:none;border-top:1px solid #dde5ee}}
.month-block{margin-bottom:16px;border-radius:10px;overflow:hidden;box-shadow:0 1px 6px rgba(0,0,0,.07)}
.month-title{font-size:13px;font-weight:700;color:#fff;background:#1a3a5c;padding:7px 14px;display:flex;justify-content:space-between;align-items:center}
.month-title span{font-size:11px;font-weight:400;opacity:.7}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);background:#fff}
.dow-header{font-size:10px;text-align:center;padding:4px 0;background:#eaf1fb;border-bottom:1px solid #c8d8ea;color:#4a6080;font-weight:600}
.dow-header.sun{color:#c0392b}.dow-header.sat{color:#2471a3}
.day-cell{min-height:58px;border-right:1px solid #e8eef4;border-bottom:1px solid #e8eef4;padding:3px 4px;cursor:pointer;position:relative;transition:background .1s}
.day-cell:nth-child(7n){border-right:none}
.day-cell:hover{background:#e8f0fe!important}
.day-cell.empty{background:#f8f9fb;cursor:default;pointer-events:none}
.day-cell.selected{outline:2px solid #1a3a5c;outline-offset:-2px;z-index:1}
.day-cell.bg-sun{background:#fff5f5}.day-cell.bg-sat{background:#f5f9ff}
.day-cell.bg-hol{background:#fff0f0}.day-cell.bg-vac{background:#fff8ee}.day-cell.bg-closed{background:#fff0f0}
.day-num{font-size:12px;font-weight:700;line-height:1.2}
.c-sun,.c-hol{color:#c0392b}.c-sat{color:#2471a3}.c-norm{color:#2c3e50}
.day-tags{display:flex;flex-direction:column;gap:1px;margin-top:2px}
.dt{font-size:9px;padding:1px 3px;border-radius:2px;line-height:1.4;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.dt-closed{background:#fde8e8;color:#801515}.dt-teiji{background:#fff3cd;color:#7c5c00}
.dt-tsushin{background:#d4edda;color:#145c2a}.dt-hol{background:#fde8e8;color:#801515}.dt-vac{background:#fff3cd;color:#7c5c00}
.park-dot{position:absolute;top:3px;right:3px;width:7px;height:7px;border-radius:50%}
.park-dot.partial{background:#ef9f27}.park-dot.busy{background:#e24b4a}.park-dot.avail{background:#1d9e75}
.park-header{padding:14px 16px;border-bottom:1px solid #dde5ee;background:#1a3a5c;color:#fff;position:sticky;top:0;z-index:10}
.park-header h2{font-size:14px;font-weight:700}
.park-header p{font-size:11px;opacity:.65;margin-top:2px}
.park-close-btn{float:right;background:none;border:none;color:#fff;font-size:18px;cursor:pointer;line-height:1;padding:0}
.section-block{padding:12px 14px;border-bottom:1px solid #eef2f7}
.section-title{font-size:11px;font-weight:700;color:#556677;margin-bottom:8px;letter-spacing:.04em}
.event-item{font-size:11px;padding:5px 8px;border-radius:5px;margin-bottom:3px;display:flex;align-items:flex-start;gap:5px}
.ev-teiji{background:#fff3cd;color:#7c5c00}.ev-tsushin{background:#d4edda;color:#145c2a}
.ev-closed{background:#fde8e8;color:#801515}.ev-hol{background:#fde8e8;color:#801515}
.ev-label{font-weight:700;min-width:14px;flex-shrink:0}
.ev-del{background:none;border:none;color:inherit;opacity:.5;cursor:pointer;font-size:13px;padding:0 2px;margin-left:auto}
.lot-card{background:#fff;border:1px solid #e0e8f0;border-radius:8px;margin-bottom:10px;overflow:hidden}
.lot-header{padding:7px 12px;background:#f5f8fc;border-bottom:1px solid #e0e8f0;display:flex;align-items:center;justify-content:space-between}
.lot-name{font-size:12px;font-weight:700;color:#1a3a5c}
.lot-badge{font-size:10px;padding:2px 8px;border-radius:10px;font-weight:600}
.badge-free{background:#d4edda;color:#145c2a}.badge-busy{background:#fde8e8;color:#801515}
.booking-list{padding:6px 10px}
.booking-item{background:#f8fafc;border:1px solid #e8eef4;border-radius:6px;padding:6px 10px;margin-bottom:5px;display:flex;align-items:center;justify-content:space-between}
.bcar{font-size:12px;font-weight:600;color:#1a2a3a}.btime{font-size:10px;color:#667788;margin-top:1px}
.btn-edit{font-size:10px;color:#2471a3;background:none;border:none;cursor:pointer;text-decoration:underline;padding:0}
.btn-del{font-size:14px;color:#c0392b;background:none;border:none;cursor:pointer;padding:0 2px}
.add-btn{display:flex;align-items:center;justify-content:center;gap:5px;font-size:11px;color:#1a3a5c;background:none;border:1px dashed #8aaac8;border-radius:6px;padding:6px;cursor:pointer;width:100%;margin:4px 0 2px;font-family:inherit}
.add-btn:hover{background:#eaf1fb}
.form-box{background:#f5f8fc;border:1px solid #dde5ee;border-radius:8px;padding:10px 12px;margin-top:6px}
.form-row{display:flex;flex-direction:column;gap:3px;margin-bottom:8px}
.form-row label{font-size:10px;color:#667788;font-weight:700}
.form-row select,.form-row input[type=text]{font-size:12px;padding:6px 8px;border-radius:6px;border:1px solid #c8d8ea;background:#fff;color:#1a2a3a;width:100%;font-family:inherit}
.form-actions{display:flex;gap:6px;justify-content:flex-end;margin-top:4px}
.btn-save{background:#1a3a5c;color:#fff;border:none;border-radius:6px;padding:6px 16px;font-size:11px;cursor:pointer;font-family:inherit}
.btn-save:hover{background:#2c5282}.btn-save:disabled{opacity:.5;cursor:not-allowed}
.btn-cancel-f{background:#fff;border:1px solid #c8d8ea;border-radius:6px;padding:6px 12px;font-size:11px;cursor:pointer;color:#556677;font-family:inherit}
.type-btns{display:flex;gap:4px;flex-wrap:wrap}
.type-btn{padding:4px 10px;border-radius:12px;font-size:10px;border:1px solid #c8d8ea;cursor:pointer;background:#fff;color:#556677;font-family:inherit}
.type-btn.sel-teiji{background:#fff3cd;color:#7c5c00;border-color:#e6c800;font-weight:700}
.type-btn.sel-tsushin{background:#d4edda;color:#145c2a;border-color:#7ecf9c;font-weight:700}
.type-btn.sel-closed{background:#fde8e8;color:#801515;border-color:#f5a0a0;font-weight:700}
.empty-msg{font-size:11px;color:#99aabb;padding:4px 2px}
.setup-banner{background:#fff3cd;border:1px solid #e6c800;border-radius:8px;padding:12px 16px;margin:10px 0;font-size:12px;color:#7c5c00;line-height:1.6}
.setup-banner strong{display:block;margin-bottom:4px;font-size:13px}
.setup-banner code{background:#fff;padding:2px 5px;border-radius:3px;font-family:monospace;font-size:11px;word-break:break-all}
</style>
</head>
<body>
<div class="app">
<div class="topbar">
  <div class="topbar-left">
    <h1>秋田明徳館高校　統合カレンダー　令和8年度</h1>
    <p>年間行事予定（定時制・通信制）＋ 駐車場予約システム</p>
  </div>
  <div class="sync-status" id="syncStatus">
    <div class="sync-dot loading" id="syncDot"></div>
    <span id="syncText">接続中...</span>
  </div>
</div>
<div class="legend">
  <div class="leg"><div class="leg-dot" style="background:#fde8e8;border:1px solid #f5a0a0"></div>閉館・休日</div>
  <div class="leg"><div class="leg-dot" style="background:#fff3cd;border:1px solid #e6c800"></div>定時制行事</div>
  <div class="leg"><div class="leg-dot" style="background:#d4edda;border:1px solid #7ecf9c"></div>通信制行事</div>

</div>

<div class="jump-nav" id="jumpNav"></div>
<div class="main-area">
  <div class="cal-panel" id="calPanel"><div style="padding:20px;color:#667788;font-size:13px">読み込み中...</div></div>

</div>
</div>
<script>
// ============================================================
// ★ GASデプロイ後、ここにURLを貼り付けてください ★
const GAS_URL = 'https://script.google.com/macros/s/AKfycbxSJ3DmujWAhSRY_T02IitoKSi1Z_7EdJsmZQzlLBXrB8gDTZbDf8I62Pj6JTIy7xfWFw/exec';
// ============================================================

const LOTS=['駐車場2','駐車場3','駐車場4','駐車場9'];
const CLOSED={'4-11':'D1','4-12':'S1（離任式）','4-18':'D2','4-19':'S2','4-25':'PTA総会','5-9':'D3','5-10':'S3','5-23':'D4','5-24':'S4','6-6':'D5','6-7':'S5','6-20':'D6','6-21':'S6','7-4':'D7','7-5':'S7','7-17':'D8','7-19':'S8','8-10':'学校閉庁日','8-12':'学校閉庁日','8-13':'学校閉庁日','8-14':'学校閉庁日','9-1':'前期T','9-2':'前期T','9-22':'D9','9-23':'S9','10-3':'D10','10-4':'S10','10-17':'D11','10-18':'S11','10-23':'明徳祭','10-24':'明徳祭（一般）','10-26':'振替休業','10-31':'D12','11-1':'S12','11-14':'D13','11-15':'S13','11-28':'D14','11-29':'S14','12-5':'D15','12-13':'S15','12-28':'仕事納め','12-29':'常駐警備なし','12-30':'常駐警備なし','12-31':'常駐警備なし','1-1':'元日','1-2':'常駐警備なし','1-3':'常駐警備なし','1-9':'後期T（4年・3修3年）','1-10':'S16','1-11':'成人の日','2-11':'建国記念の日','2-23':'天皇誕生日','3-20':'春分の日'};
const HOLIDAYS={'4-29':'昭和の日','5-3':'憲法記念日','5-4':'みどりの日','5-5':'こどもの日','7-20':'海の日','8-11':'山の日','9-21':'敬老の日','9-22':'国民の休日','9-23':'秋分の日','10-12':'スポーツの日','11-3':'文化の日','11-23':'勤労感謝の日','1-1':'元日','1-11':'成人の日','2-11':'建国記念の日','2-23':'天皇誕生日','3-20':'春分の日'};
const BASE_TEIJI={'4-6':'新任式・始業式・年次集会','4-7':'大清掃','4-8':'身体測定（在校生）','4-9':'交通安全教室・生徒会入会式','4-13':'PTA役員会（旧）・新入生基礎学力テスト','4-14':'結核検診','4-15':'生徒会委員選出・内科健診','4-17':'歯科健診','4-21':'尿検査①','4-22':'定例職員会議・4月職員会議','4-23':'心電図検査','4-25':'PTA総会・PTA講演会','4-28':'担任連絡会④','5-7':'登下校指導①（〜13日）','5-13':'進路ガイダンス（3・4年次）','5-14':'PTA役員会（新年度）','5-20':'生徒総会・5月職員会議','5-22':'定例職員会議','5-26':'防災避難訓練','5-27':'英検IBA・耳鼻科健診','6-1':'薬物乱用防止教室','6-6':'成績入力締切','6-15':'定例職員会議','6-17':'成績会議','6-22':'前期中間考査（〜26日）','6-24':'定例職員会議','7-6':'成績入力締切','7-7':'前期期末考査（〜11日）','7-15':'定例職員会議','7-17':'成績会議','7-21':'防犯教室','9-19':'授業再開・8月職員会議','9-24':'卒業認定会議','9-25':'定例職員会議','9-30':'前期終業式・賞状伝達式','10-1':'後期始業式','10-2':'10月入学式','10-7':'秋田県定通生活体験発表会','10-14':'体験入学','10-21':'10月職員会議','10-23':'明徳祭','10-24':'明徳祭（一般公開）','10-26':'振替休業','11-4':'後期生徒会総会','11-10':'芸術鑑賞教室','11-11':'進路ガイダンス','11-13':'通知表発送','11-24':'後期中間考査（〜30日）','11-25':'定例職員会議','12-7':'冬の読書週間（〜18日）','12-16':'12月職員会議','12-17':'成績会議','12-23':'通知表発送','12-28':'仕事納め','1-6':'担任連絡会⑳','1-8':'高教研定通部会','1-13':'集団コミュニケーション活動','1-14':'授業再開','1-19':'1月職員会議','1-27':'定例職員会議','2-4':'後期期末考査（〜10日）','2-17':'2月職員会議','2-22':'卒業認定会議','2-25':'卒業式予行・表彰式','3-3':'卒業式（ミルハス 14:00）','3-18':'後期終業式','3-25':'離任式・3月職員会議'};
const BASE_TSUSHIN={'4-12':'S1 リポート①','4-19':'S2 リポート②','5-10':'S3 リポート③','5-24':'S4 リポート④','6-7':'S5 リポート⑤','6-21':'S6 リポート⑥','7-5':'S7 リポート⑦','7-19':'S8 リポート⑧','9-23':'S9 リポート⑨','10-4':'S10 後期始業式・リポート⑩','10-18':'S11 リポート⑪','11-1':'S12 リポート⑫','11-15':'S13 リポート⑬','11-29':'S14 リポート⑭','12-13':'S15 タイムス1月号','1-10':'S16 3修3年T','1-24':'後期T1（通信）','1-31':'後期T2・卒業生を送る会','2-6':'後期追T','2-10':'後期再T','3-14':'受講登録日'};
const VACATION_RANGES=[{s:[2026,7,22],e:[2026,8,18],l:'夏季休業'},{s:[2026,12,22],e:[2027,1,13],l:'冬季休業'},{s:[2027,3,22],e:[2027,4,4],l:'春季休業'}];
const MONTHS=[[2026,4,'4月'],[2026,5,'5月'],[2026,6,'6月'],[2026,7,'7月'],[2026,8,'8月'],[2026,9,'9月'],[2026,10,'10月'],[2026,11,'11月'],[2026,12,'12月'],[2027,1,'1月'],[2027,2,'2月'],[2027,3,'3月']];
const DOW=['日','月','火','水','木','金','土'];

function isVacation(y,m,d){const t=new Date(y,m-1,d).getTime();for(const r of VACATION_RANGES){if(t>=new Date(r.s[0],r.s[1]-1,r.s[2]).getTime()&&t<=new Date(r.e[0],r.e[1]-1,r.e[2]).getTime())return r.l;}return null;}
function daysInMonth(y,m){return new Date(y,m,0).getDate();}
function firstDow(y,m){return new Date(y,m-1,1).getDay();}
function dateKey(y,m,d){return `${y}-${m}-${d}`;}
function genTimes(){const t=[];for(let h=6;h<=22;h++){t.push(`${String(h).padStart(2,'0')}:00`);t.push(`${String(h).padStart(2,'0')}:30`);}t.push('23:00');return t;}
const TIMES=genTimes();

let DB={bookings:{},events:{}};
let selectedDate=null,activeFilter='all',editingBooking=null;
let showAddEventForm={},showBookingForm={},_evType='teiji',gasReady=false;

function setSyncStatus(state,text){
  document.getElementById('syncDot').className='sync-dot'+(state==='ok'?'':state==='loading'?' loading':' error');
  document.getElementById('syncText').textContent=text;
}

async function gasGet(p){const r=await fetch(GAS_URL+'?'+new URLSearchParams(p));return r.json();}
async function gasPost(b){const r=await fetch(GAS_URL,{method:'POST',headers:{'Content-Type':'text/plain'},body:JSON.stringify(b)});return r.json();}

async function loadFromGAS(){
  if(GAS_URL.includes('ここに')){
    setSyncStatus('error','GAS未設定（ローカル動作中）');
    try{DB=JSON.parse(localStorage.getItem('meitoku_r8_local')||'{"bookings":{},"events":{}}');}catch(e){DB={bookings:{},events:{}};}
    return;
  }
  setSyncStatus('loading','データ読み込み中...');
  try{
    const data=await gasGet({action:'getAll'});
    if(data.error)throw new Error(data.error);
    DB=data;gasReady=true;
    setSyncStatus('ok','同期済み');
    localStorage.setItem('meitoku_r8_backup',JSON.stringify(DB));
  }catch(e){
    const bk=localStorage.getItem('meitoku_r8_backup');
    if(bk)try{DB=JSON.parse(bk);}catch(e2){}
    setSyncStatus('error','オフライン（キャッシュ使用中）');
  }
}

function getBaseEvents(m,d){const mk=`${m}-${d}`,ev=[];if(HOLIDAYS[mk])ev.push({type:'hol',text:HOLIDAYS[mk],id:'base-h-'+mk});else if(CLOSED[mk])ev.push({type:'closed',text:CLOSED[mk],id:'base-c-'+mk});if(BASE_TEIJI[mk])ev.push({type:'teiji',text:BASE_TEIJI[mk],id:'base-t-'+mk});if(BASE_TSUSHIN[mk])ev.push({type:'tsushin',text:BASE_TSUSHIN[mk],id:'base-s-'+mk});return ev;}
function getAllEvents(y,m,d){return[...getBaseEvents(m,d),...(DB.events[dateKey(y,m,d)]||[])];}
function getParkStatus(y,m,d){const bk=DB.bookings[dateKey(y,m,d)]||{};const n=LOTS.filter(l=>(bk[l]||[]).length>0).length;if(n===0)return null;return n<LOTS.length?'partial':'busy';}
function hasParkBooking(y,m,d){const bk=DB.bookings[dateKey(y,m,d)]||{};return LOTS.some(l=>(bk[l]||[]).length>0);}

function renderCal(){
  const cp=document.getElementById('calPanel');
  let html='';
  if(GAS_URL.includes('ここに')){
    html+=`<div class="setup-banner" style="margin:10px"><strong>★ GAS URLの設定が必要です（データ共有を使う場合）</strong>GASをデプロイしてURLを取得後、このHTMLの <code>const GAS_URL = 'https://script.google.com/macros/s/AKfycbxSJ3DmujWAhSRY_T02IitoKSi1Z_7EdJsmZQzlLBXrB8gDTZbDf8I62Pj6JTIy7xfWFw/exec';</code> を書き換えてGitHubにアップロードしてください。<br>設定前でもカレンダー閲覧・ローカル保存は利用できます。</div>`;
  }
  MONTHS.forEach(([y,m,mname])=>{
    const days=daysInMonth(y,m),fd=firstDow(y,m);
    let eventDays=0,gridHtml='';
    for(let i=0;i<fd;i++)gridHtml+=`<div class="day-cell empty"></div>`;
    for(let d=1;d<=days;d++){
      const dow=new Date(y,m-1,d).getDay(),mk=`${m}-${d}`,dk=dateKey(y,m,d);
      const isSun=dow===0,isSat=dow===6,hol=HOLIDAYS[mk]||'',closed=CLOSED[mk]||'',vac=isVacation(y,m,d);
      const teiji=BASE_TEIJI[mk]||'',tsushin=BASE_TSUSHIN[mk]||'',extraEvs=DB.events[dk]||[];
      const parkSt=getParkStatus(y,m,d),hasPark=hasParkBooking(y,m,d);
      const isSel=selectedDate&&selectedDate[0]===y&&selectedDate[1]===m&&selectedDate[2]===d;
      let show=true;
      if(activeFilter==='closed'&&!hol&&!closed)show=false;
      if(activeFilter==='teiji'&&!teiji&&!extraEvs.some(e=>e.type==='teiji'))show=false;
      if(activeFilter==='tsushin'&&!tsushin&&!extraEvs.some(e=>e.type==='tsushin'))show=false;
      if(activeFilter==='park'&&!hasPark)show=false;
      if(!show){gridHtml+=`<div class="day-cell empty" style="opacity:.18"><div class="day-num c-norm" style="font-size:10px">${d}</div></div>`;continue;}
      if(teiji||tsushin||hol||closed||extraEvs.length>0)eventDays++;
      const bgCls=hol||isSun?'bg-hol':isSat?'bg-sat':vac?'bg-vac':closed?'bg-closed':'';
      const numCls=hol?'c-hol':isSun?'c-sun':isSat?'c-sat':'c-norm';
      let tags='';
      if(hol)tags+=`<div class="dt dt-hol">${hol}</div>`;
      else if(vac)tags+=`<div class="dt dt-vac">${vac}</div>`;
      else if(closed)tags+=`<div class="dt dt-closed">${closed}</div>`;
      if(teiji)tags+=`<div class="dt dt-teiji">${teiji}</div>`;
      if(tsushin)tags+=`<div class="dt dt-tsushin">${tsushin}</div>`;
      extraEvs.forEach(ev=>tags+=`<div class="dt dt-${ev.type==='teiji'?'teiji':ev.type==='tsushin'?'tsushin':'closed'}">${ev.text}</div>`);
      gridHtml+=`<div class="day-cell ${bgCls}${isSel?' selected':''}" data-y="${y}" data-m="${m}" data-d="${d}">
        <div class="day-num ${numCls}">${d}</div>
        <div class="day-tags">${tags}</div>
        ${hasPark?`<div class="park-dot ${parkSt}"></div>`:''}
      </div>`;
    }
    const rem=(fd+days)%7;if(rem)for(let i=0;i<7-rem;i++)gridHtml+=`<div class="day-cell empty"></div>`;
    html+=`<div class="month-block" id="m${y}-${m}">
      <div class="month-title">${mname}（令和${y===2026?'8':'9'}年${m}月）<span>行事 ${eventDays}日</span></div>
      <div class="cal-grid">${DOW.map((dn,i)=>`<div class="dow-header ${i===0?'sun':i===6?'sat':''}">${dn}</div>`).join('')}${gridHtml}</div>
    </div>`;
  });
  cp.innerHTML=html;
  cp.querySelectorAll('.day-cell:not(.empty)').forEach(cell=>{
    cell.addEventListener('click',function(){
      selectedDate=[+this.dataset.y,+this.dataset.m,+this.dataset.d];
      renderCal();openPanel(...selectedDate);
    });
  });
}

function buildJumpNav(){
  document.getElementById('jumpNav').innerHTML='<span style="font-size:10px;color:#8899aa;align-self:center">月へ移動：</span>'+
    MONTHS.map(([y,m,mn])=>`<button class="jump-btn" onclick="document.getElementById('m${y}-${m}').scrollIntoView({behavior:'smooth'})">${mn}</button>`).join('');
}

function openPanel(y,m,d){document.getElementById('parkPanel').classList.add('open');renderPanel(y,m,d);}
function closePanel(){document.getElementById('parkPanel').classList.remove('open');selectedDate=null;renderCal();}

function renderPanel(y,m,d){
  const pp=document.getElementById('parkPanel'),dk=dateKey(y,m,d),dow=new Date(y,m-1,d).getDay();
  const events=getAllEvents(y,m,d),bk=DB.bookings[dk]||{},vac=isVacation(y,m,d);
  let h=`<div class="park-header"><button class="park-close-btn" onclick="closePanel()">&#x2715;</button>
    <h2>${y}年${m}月${d}日（${DOW[dow]}）</h2><p>${vac?`【${vac}】`:''}行事・駐車場予約</p></div>`;
  h+=`<div class="section-block"><div class="section-title">行事・閉館情報</div>`;
  if(!events.length)h+=`<div class="empty-msg">行事なし</div>`;
  events.forEach(ev=>{
    const cls=ev.type==='teiji'?'ev-teiji':ev.type==='tsushin'?'ev-tsushin':ev.type==='hol'?'ev-hol':'ev-closed';
    const lbl=ev.type==='teiji'?'定':ev.type==='tsushin'?'通':ev.type==='hol'?'祝':'休';
    const canDel=ev.id&&!ev.id.startsWith('base');
    h+=`<div class="event-item ${cls}"><span class="ev-label">${lbl}</span><span style="flex:1">${ev.text}</span>${canDel?`<button class="ev-del" onclick="deleteEvent('${dk}','${ev.id}')">&#x2715;</button>`:''}</div>`;
  });
  if(showAddEventForm[dk]){
    h+=`<div class="form-box"><div class="form-row"><label>種別</label><div class="type-btns">
      <button class="type-btn${_evType==='teiji'?' sel-teiji':''}" onclick="setEvType('teiji')">定時制</button>
      <button class="type-btn${_evType==='tsushin'?' sel-tsushin':''}" onclick="setEvType('tsushin')">通信制</button>
      <button class="type-btn${_evType==='closed'?' sel-closed':''}" onclick="setEvType('closed')">閉館・休日</button>
    </div></div>
    <div class="form-row"><label>行事名</label><input type="text" id="evText" placeholder="行事名を入力"/></div>
    <div class="form-actions"><button class="btn-cancel-f" onclick="toggleEvForm('${dk}')">キャンセル</button>
    <button class="btn-save" id="evSaveBtn" onclick="saveEvent('${dk}')">追加</button></div></div>`;
  }else{h+=`<button class="add-btn" onclick="toggleEvForm('${dk}')">+ 行事を追加</button>`;}
  h+=`</div><div class="section-block"><div class="section-title">駐車場予約（4台）</div>`;
  LOTS.forEach(lot=>{
    const slots=bk[lot]||[],fk=`${dk}-${lot}`,isFree=slots.length===0;
    const isEditThis=editingBooking&&editingBooking.dk===dk&&editingBooking.lot===lot;
    h+=`<div class="lot-card"><div class="lot-header"><span class="lot-name">${lot}</span>
      <span class="lot-badge ${isFree?'badge-free':'badge-busy'}">${isFree?'空き':'予約中'}</span></div>
      <div class="booking-list">`;
    slots.forEach((s,i)=>{
      h+=`<div class="booking-item"><div><div class="bcar">${s.car||'—'}</div><div class="btime">${s.start} 〜 ${s.end}</div></div>
        <div style="display:flex;gap:4px"><button class="btn-edit" onclick="startEdit('${dk}','${lot}',${i})">変更</button>
        <button class="btn-del" onclick="deleteBooking('${dk}','${lot}','${s.id||i}')">&#x2715;</button></div></div>`;
    });
    if(showBookingForm[fk]||isEditThis){
      const eb=isEditThis?editingBooking.data:null;
      const sOpts=TIMES.map(t=>`<option value="${t}"${eb&&eb.start===t?' selected':''}>${t}</option>`).join('');
      const eOpts=TIMES.map(t=>`<option value="${t}"${eb&&eb.end===t?' selected':''}>${t}</option>`).join('');
      h+=`<div class="form-box">
        <div class="form-row"><label>開始時間</label><select id="bs-${fk}">${sOpts}</select></div>
        <div class="form-row"><label>終了時間</label><select id="be-${fk}">${eOpts}</select></div>
        <div class="form-row"><label>車種</label><input type="text" id="bc-${fk}" placeholder="例：プリウス / ハイエース" value="${eb?eb.car:''}"/></div>
        <div class="form-actions"><button class="btn-cancel-f" onclick="cancelBookingForm('${dk}','${lot}')">キャンセル</button>
        <button class="btn-save" onclick="saveBooking('${dk}','${lot}','${isEditThis?editingBooking.sid:'new'}')">${isEditThis?'更新':'予約する'}</button></div></div>`;
    }else{h+=`<button class="add-btn" onclick="toggleBookingForm('${dk}','${lot}')">+ 予約を追加</button>`;}
    h+=`</div></div>`;
  });
  h+=`</div>`;pp.innerHTML=h;
}

function toggleEvForm(dk){showAddEventForm[dk]=!showAddEventForm[dk];if(selectedDate)renderPanel(...selectedDate);}
function setEvType(t){_evType=t;if(selectedDate)renderPanel(...selectedDate);}

async function saveEvent(dk){
  const el=document.getElementById('evText'),text=el?el.value.trim():'';
  if(!text)return;
  const btn=document.getElementById('evSaveBtn');
  if(btn){btn.disabled=true;btn.textContent='保存中...';}
  let id='ev-'+Date.now();
  if(gasReady){setSyncStatus('loading','保存中...');try{const r=await gasPost({action:'saveEvent',dk,type:_evType,text});id=r.id;setSyncStatus('ok','同期済み');}catch(e){setSyncStatus('error','保存失敗（ローカルに保存）');}}
  if(!DB.events[dk])DB.events[dk]=[];
  DB.events[dk].push({type:_evType,text,id});
  showAddEventForm[dk]=false;
  if(!gasReady)localStorage.setItem('meitoku_r8_local',JSON.stringify(DB));
  if(selectedDate)renderPanel(...selectedDate);renderCal();
}

async function deleteEvent(dk,id){
  if(gasReady){setSyncStatus('loading','削除中...');try{await gasPost({action:'deleteEvent',id});setSyncStatus('ok','同期済み');}catch(e){setSyncStatus('error','削除失敗');}}
  if(DB.events[dk])DB.events[dk]=DB.events[dk].filter(e=>e.id!==id);
  if(!gasReady)localStorage.setItem('meitoku_r8_local',JSON.stringify(DB));
  if(selectedDate)renderPanel(...selectedDate);renderCal();
}

function toggleBookingForm(dk,lot){showBookingForm[`${dk}-${lot}`]=true;editingBooking=null;if(selectedDate)renderPanel(...selectedDate);}
function cancelBookingForm(dk,lot){showBookingForm[`${dk}-${lot}`]=false;editingBooking=null;if(selectedDate)renderPanel(...selectedDate);}

async function saveBooking(dk,lot,sid){
  const fk=`${dk}-${lot}`,start=document.getElementById(`bs-${fk}`).value,end=document.getElementById(`be-${fk}`).value,car=document.getElementById(`bc-${fk}`).value.trim()||'車種未入力';
  const isEdit=sid!=='new';let newId=isEdit?sid:'b-'+Date.now();
  if(gasReady){setSyncStatus('loading','保存中...');try{const r=await gasPost({action:'saveBooking',dk,lot,start,end,car,...(isEdit?{id:sid}:{})});newId=r.id;setSyncStatus('ok','同期済み');}catch(e){setSyncStatus('error','保存失敗');}}
  if(!DB.bookings[dk])DB.bookings[dk]={};if(!DB.bookings[dk][lot])DB.bookings[dk][lot]=[];
  if(isEdit){const idx=DB.bookings[dk][lot].findIndex(s=>String(s.id)===String(sid));if(idx>=0)DB.bookings[dk][lot][idx]={start,end,car,id:newId};}
  else DB.bookings[dk][lot].push({start,end,car,id:newId});
  showBookingForm[fk]=false;editingBooking=null;
  if(!gasReady)localStorage.setItem('meitoku_r8_local',JSON.stringify(DB));
  if(selectedDate)renderPanel(...selectedDate);renderCal();
}

async function deleteBooking(dk,lot,sid){
  if(gasReady){setSyncStatus('loading','削除中...');try{await gasPost({action:'deleteBooking',id:sid});setSyncStatus('ok','同期済み');}catch(e){setSyncStatus('error','削除失敗');}}
  if(DB.bookings[dk]&&DB.bookings[dk][lot])DB.bookings[dk][lot]=DB.bookings[dk][lot].filter(s=>String(s.id)!==String(sid));
  if(!gasReady)localStorage.setItem('meitoku_r8_local',JSON.stringify(DB));
  if(selectedDate)renderPanel(...selectedDate);renderCal();
}

function startEdit(dk,lot,idx){
  const s=DB.bookings[dk][lot][idx];
  editingBooking={dk,lot,idx,sid:s.id,data:s};
  showBookingForm[`${dk}-${lot}`]=true;
  if(selectedDate)renderPanel(...selectedDate);
}

document.getElementById('filterBar').querySelectorAll('.pill').forEach(pill=>{
  pill.addEventListener('click',function(){
    activeFilter=this.dataset.f;
    document.querySelectorAll('.pill').forEach(p=>p.classList.remove('on'));
    this.classList.add('on');renderCal();
  });
});

buildJumpNav();
loadFromGAS().then(()=>renderCal());
</script>
</body>
</html>
